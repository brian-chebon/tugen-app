<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn the Tugen language — an audio-first app for Kalenjin heritage speakers, students, and educators.">
  <meta name="keywords" content="Tugen, Kalenjin, language learning, Kenya, Baringo">
  <meta name="theme-color" content="#C75B39">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Tugen Language Learning App">
  <meta property="og:description" content="Learn the Tugen language — phrases, flashcards and stories with native audio.">

  <!-- iOS PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tugen">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Tugen — Learn the Language</title>
  <link rel="manifest" href="manifest.json">

  <!-- Splash screen style -->
  <style>
    body {
      margin: 0;
      background-color: #FAF7F4;
      font-family: sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #C75B39;
    }
    #loading h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    #loading p {
      color: #6B5A4E;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Tugen</h1>
    <p>Chamgei — Loading...</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide loading screen once Flutter initializes
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
</body>
</html>
