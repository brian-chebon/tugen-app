name: tugen_app
description: Tugen Language Learning App - Learn the Tugen (Kalenjin) language through phrases, vocabulary games, and interactive stories.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Navigation ---
  go_router: ^14.6.2

  # --- Firebase ---
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.1
  firebase_analytics: ^11.4.1
  firebase_messaging: ^15.2.1

  # --- Local Database (Drift) ---
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # --- Key-Value Storage ---
  shared_preferences: ^2.3.4

  # --- Audio ---
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.1.22
  audio_waveforms: ^1.2.0

  # --- Spaced Repetition ---
  fsrs: ^2.0.1

  # --- Networking ---
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # --- UI / Design ---
  flutter_animate: ^4.5.2
  lottie: ^3.2.0
  confetti: ^0.8.0
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # --- Utilities ---
  path_provider: ^2.1.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  logger: ^2.5.0
  collection: ^1.19.1
  equatable: ^2.0.7
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/phrases/
    - assets/audio/stories/
    - assets/images/
    - assets/l10n/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
