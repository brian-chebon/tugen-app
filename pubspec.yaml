name: tugen_app
description: Tugen Language Learning App - Learn the Tugen (Kalenjin) language through phrases, vocabulary games, and interactive stories.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # --- Navigation ---
  go_router: ^17.1.0

  # --- Firebase (Auth, Storage, Analytics) ---
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  firebase_analytics: ^12.1.3
  firebase_messaging: ^16.1.2

  # --- Supabase (Database) ---
  supabase_flutter: ^2.8.0

  # --- Local Database (Drift) ---
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # --- Key-Value Storage ---
  shared_preferences: ^2.3.4

  # --- Audio ---
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.2.3
  audio_waveforms: ^2.0.2

  # --- Spaced Repetition ---
  fsrs: ^2.0.1

  # --- Networking ---
  dio: ^5.7.0
  connectivity_plus: ^7.0.0

  # --- UI / Design ---
  flutter_animate: ^4.5.2
  lottie: ^3.2.0
  confetti: ^0.8.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^8.0.2

  # --- Utilities ---
  path: ^1.9.0
  path_provider: ^2.1.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  logger: ^2.5.0
  collection: ^1.19.1
  equatable: ^2.0.7
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/phrases/
    - assets/audio/stories/
    - assets/images/
    - assets/l10n/

